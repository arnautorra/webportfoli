<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arnau Torra</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cursor"></div>
<div id="lb-cursor"><svg id="lb-arrow" viewBox="0 0 36 36"></svg></div>

<!-- HEADER GRID -->
<header id="header-grid">
  <a class="h-left" href="/">Projectes</a>
  <a class="h-mid" href="/">Arnau Torra</a>
  <a class="h-right" href="/contacte.html">CONTACTE</a>
</header>

<!-- FOOTER GRID (mòbil) -->
<div id="footer-grid">
  <a href="mailto:info.arnautorra@gmail.com">info.arnautorra@gmail.com</a>
</div>

<main id="projectes"><div class="grid" id="grid"></div></main>

<!-- LIGHTBOX -->
<div id="lightbox">

  <!-- HEADER PROJECTE -->
  <div id="lb-header">
    <div id="lb-info">
      <!-- FIX: botó ‹ per tornar enrere -->
      <button id="lb-back">‹ <span id="lb-back-label">Projectes</span></button>
      <span id="lb-info-title"></span>
      <span id="lb-info-sep">—</span>
      <span id="lb-info-sub"></span>
    </div>
    <a class="h-mid" id="lb-home" href="/">Arnau Torra</a>
    <a class="h-right" href="/contacte.html">CONTACTE</a>
  </div>

  <!-- STAGE -->
  <div id="lb-stage">
    <div id="lb-left-zone"></div>
    <div id="lb-right-zone"></div>
    <img class="lb-slide" id="lb-img-a" src="" alt="">
    <img class="lb-slide" id="lb-img-b" src="" alt="">
  </div>

  <!-- FIX: FOOTER amb thumbnails centrades entre ✕ i comptador -->
  <div id="lb-footer">
    <button id="lb-close">✕</button>
    <div id="lb-thumbs"></div>
    <div id="lb-counter"></div>
  </div>

  <!-- FOOTER PROJECTE MÒBIL -->
  <div id="lb-footer-mobile">
    <button id="lb-close-mobile">✕</button>
    <button id="lb-scroll-top">↑</button>
    <a href="mailto:info.arnautorra@gmail.com">info.arnautorra@gmail.com</a>
  </div>

</div>

<script>
  const redirect = sessionStorage.getItem('redirect');
  if (redirect) {
    sessionStorage.removeItem('redirect');
    history.replaceState(null, '', redirect);
  }
</script>
<script src="projects.js"></script>
<script src="main.js"></script>
</body>
</html>
