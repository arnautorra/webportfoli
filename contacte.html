<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacte — Arnau Torra</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ── Contacte ── */
  .contacte-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: calc(var(--header-h) + 40px) var(--pad-header) 60px;
    gap: 60px;
  }

  .contacte-foto {
    flex: 1 1 45%;
    max-width: 520px;
  }
  .contacte-foto img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
  }

  .contacte-text {
    flex: 1 1 45%;
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 440px;
  }

  .contacte-text p {
    font-size: 14px;
    line-height: 1.75;
    color: #333;
    font-weight: 300;
  }

  .contacte-correu {
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px solid #ccc;
    padding-bottom: 2px;
    display: inline-block;
    transition: border-color .2s;
  }
  .contacte-correu:hover { border-color: #111; }

  /* Mòbil */
  @media (hover:none) {
    .contacte-wrap {
      flex-direction: column;
      padding-left: 20px;
      padding-right: 20px;
      gap: 32px;
    }
    .contacte-foto { max-width: 100%; }
    .contacte-text { max-width: 100%; }
  }
</style>
</head>
<body>

<div id="cursor"></div>

<header id="header-grid">
  <a class="h-left" href="/">Projectes</a>
  <a class="h-mid" href="/">Arnau Torra</a>
  <a class="h-right active" href="/contacte">Contacte</a>
</header>

<main>
  <div class="contacte-wrap">
    <div class="contacte-foto">
      <img src="projectes/2505_CriptaGuell/09.jpg" alt="Arnau Torra">
    </div>
    <div class="contacte-text">
      <p>
        <!-- EDITA AQUÍ EL TEU TEXT DE PRESENTACIÓ -->
        El teu text de presentació aquí.
      </p>
      <a class="contacte-correu" href="mailto:info.arnautorra@gmail.com">info.arnautorra@gmail.com</a>
    </div>
  </div>
</main>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left    = e.clientX + 'px';
    cursor.style.top     = e.clientY + 'px';
    cursor.style.opacity = '1';
  });
  document.addEventListener('mouseleave', () => { cursor.style.opacity = '0'; });
  document.querySelectorAll('a').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
  });
</script>
</body>
</html>
